services:
  postgres:
    image: postgres:16
    container_name: mobilya_postgres
    environment:
      POSTGRES_DB: mobilya
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - mobilya_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mobilya"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  mobilya_postgres_data: